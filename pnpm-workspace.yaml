packages:
  - apps/*
  - packages/*
  - examples/*

catalog:
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: ^0.1.11
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  viem: 2.47.2

overrides:
  vite: 'catalog:'
  vitest: 'catalog:'

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
