name: foxer-client
env:
  CI: true
  FORCE_COLOR: 1
on:
  push:
    branches:
      - master
    paths:
      - "packages/foxer-client/**"
      - .github/workflows/foxer-client.yml
      - bun.lock
  pull_request:
    paths:
      - "packages/foxer-client/**"
      - .github/workflows/foxer-client.yml
      - bun.lock
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build --filter @hugomrdias/foxer-client
      - run: bun run check --filter @hugomrdias/foxer-client
