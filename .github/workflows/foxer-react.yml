name: foxer-react
env:
  CI: true
  FORCE_COLOR: 1
on:
  push:
    branches:
      - master
    paths:
      - "packages/foxer-react/**"
      - .github/workflows/foxer-react.yml
      - bun.lock
  pull_request:
    paths:
      - "packages/foxer-react/**"
      - .github/workflows/foxer-react.yml
      - bun.lock
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build --filter @hugomrdias/foxer-react
      - run: bun run check --filter @hugomrdias/foxer-react
