name: foxer-react
env:
  CI: true
  FORCE_COLOR: 1
on:
  push:
    branches:
      - main
    paths:
      - "packages/foxer-react/**"
      - .github/workflows/foxer-react.yml
      - pnpm-lock.yaml
  pull_request:
    paths:
      - "packages/foxer-react/**"
      - .github/workflows/foxer-react.yml
      - pnpm-lock.yaml
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
      - run: pnpm install
      - run: pnpm run build
      - run: pnpm -r --filter foxer-react run lint
